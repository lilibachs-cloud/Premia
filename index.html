<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premià – Leilighetsguide</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --cream: #f7f3ee;
    --warm-white: #fdfaf6;
    --terracotta: #c4673a;
    --terracotta-light: #e8896a;
    --terracotta-pale: #f5e6de;
    --stone: #8a7d70;
    --dark: #2c2420;
    --text: #3d322b;
    --border: #e0d5cb;
    --shadow: rgba(44,36,32,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  header {
    background: var(--dark);
    color: var(--cream);
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.04em;
  }
  .header-title span { color: var(--terracotta-light); font-style: italic; }
  .header-sub {
    font-size: 0.75rem;
    color: var(--stone);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .search-bar {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 8px 16px;
    gap: 10px;
    min-width: 240px;
  }
  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    width: 100%;
  }
  .search-bar input::placeholder { color: var(--stone); }

  .tabs {
    display: flex;
    gap: 4px;
    background: #e8ddd4;
    padding: 10px 20px 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tab {
    padding: 12px 24px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    color: var(--stone);
    background: #d4c9be;
    border-radius: 8px 8px 0 0;
    border: 1px solid #c5b8ac;
    border-bottom: none;
    white-space: nowrap;
    transition: background 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    gap: 9px;
    min-width: 120px;
    justify-content: center;
  }
  .tab:hover { background: #ede4da; color: var(--terracotta); }
  .tab.active {
    background: var(--warm-white);
    color: var(--terracotta);
    font-weight: 600;
    border-color: var(--border);
    box-shadow: 0 -2px 0 var(--terracotta) inset;
    z-index: 1;
  }
  .tab-icon { font-size: 20px; }
  .tabs-border { height: 2px; background: var(--border); }

  .main { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }

  .section-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow);
    transition: box-shadow 0.2s;
  }
  .section-card:hover { box-shadow: 0 4px 16px var(--shadow); }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    cursor: pointer;
    user-select: none;
  }
  .section-header-left { display: flex; align-items: center; gap: 14px; }
  .section-icon {
    width: 40px; height: 40px;
    background: var(--terracotta-pale);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--dark);
  }
  .chevron { color: var(--stone); font-size: 18px; transition: transform 0.25s; }
  .section-card.open .chevron { transform: rotate(180deg); }

  .section-body {
    display: none;
    padding: 0 24px 22px;
    border-top: 1px solid var(--border);
  }
  .section-card.open .section-body { display: block; }

  .editable-content {
    outline: none;
    padding: 16px 0 4px;
    min-height: 40px;
    line-height: 1.75;
    color: var(--text);
    font-size: 14.5px;
  }
  .editable-content:focus {
    background: rgba(196,103,58,0.03);
    border-radius: 6px;
    padding: 12px;
    margin: 4px -12px;
  }
  .editable-content h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    color: var(--terracotta);
    margin: 16px 0 6px;
    font-weight: 600;
  }
  .editable-content p { margin-bottom: 10px; }
  .editable-content a { color: var(--terracotta); text-decoration: none; border-bottom: 1px solid var(--terracotta-light); }
  .editable-content a:hover { color: var(--terracotta-light); }
  .editable-content ul { padding-left: 20px; margin-bottom: 10px; }
  .editable-content li { margin-bottom: 4px; }
  .editable-content img { max-width: 100%; border-radius: 8px; margin: 10px 0; }

  .edit-hint {
    font-size: 11px;
    color: var(--stone);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.2s;
    margin-top: 8px;
  }
  .section-body:hover .edit-hint { opacity: 1; }

  /* Lagre-indikator */
  .save-status {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 6px;
    height: 16px;
    transition: opacity 0.4s;
  }
  .save-status.saving { color: var(--stone); }
  .save-status.saved { color: #5a9e6f; }
  .save-status.error { color: #c0392b; }

  .add-section-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    background: none;
    border: 2px dashed var(--border);
    border-radius: 12px;
    color: var(--stone);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
    transition: border-color 0.2s, color 0.2s;
    margin-bottom: 20px;
  }
  .add-section-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }

  .map-container { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 2px 8px var(--shadow); }
  .map-container iframe { width: 100%; height: 580px; border: none; display: block; }
  .map-header {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .toolbar { display: flex; justify-content: flex-end; margin-bottom: 24px; gap: 10px; }
  .btn {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }
  .btn-primary { background: var(--terracotta); color: white; }
  .btn-primary:hover { background: var(--terracotta-light); }
  .btn-outline { background: white; color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--terracotta); color: var(--terracotta); }

  .highlight { background: #fde68a; border-radius: 2px; }
  .no-results { text-align: center; padding: 40px; color: var(--stone); font-style: italic; }

  /* Laster-animasjon */
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--stone);
    font-size: 14px;
  }
  .loading::after {
    content: '';
    display: block;
    margin: 16px auto 0;
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--terracotta);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(44,36,32,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--warm-white);
    border-radius: 16px;
    padding: 32px;
    width: 90%;
    max-width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    margin-bottom: 20px;
    color: var(--dark);
  }
  .modal input, .modal select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    margin-bottom: 14px;
    outline: none;
    background: white;
    color: var(--text);
  }
  .modal input:focus { border-color: var(--terracotta); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }

  @media (max-width: 600px) {
    header { padding: 16px; flex-direction: column; align-items: flex-start; gap: 12px; }
    .header-title { font-size: 1.6rem; }
    .search-bar { min-width: unset; width: 100%; }
    .tabs { padding: 8px 12px 0; gap: 3px; }
    .tab { padding: 10px 16px; font-size: 14px; min-width: 100px; }
    .main { padding: 16px 12px; }
    .section-header { padding: 14px 16px; }
    .section-body { padding: 0 16px 16px; }
    .map-container iframe { height: 400px; }
    .modal { padding: 24px 18px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">Premià <span>de Mar</span></div>
    <div class="header-sub">Leilighetsguide · Carrer de Santiago Rusiñol 8, 5. etg, 1. dør</div>
  </div>
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Søk i guiden…" oninput="handleSearch(this.value)">
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('guide', this)"><span class="tab-icon">🏠</span>Guiden</div>
  <div class="tab" onclick="switchTab('kart', this)"><span class="tab-icon">🗺️</span>Kart</div>
</div>
<div class="tabs-border"></div>

<div id="tab-guide" class="tab-content active">
  <div class="main">
    <div class="toolbar">
      <button class="btn btn-outline" onclick="expandAll()">↕ Åpne alle</button>
      <button class="btn btn-primary" onclick="generatePDF()">⬇ Last ned PDF</button>
    </div>
    <div id="sections-container"><div class="loading">Laster innhold</div></div>
    <button class="add-section-btn" onclick="openAddModal()">+ Legg til ny seksjon</button>
  </div>
</div>

<div id="tab-kart" class="tab-content">
  <div class="main">
    <div class="map-header">
      <div class="section-icon">🗺️</div>
      <div>
        <div class="section-title" style="font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;color:var(--dark)">Viktige tjenester i nærheten</div>
        <div style="font-size:13px;color:var(--stone);margin-top:2px">Butikker, apotek, helsestasjon og mer</div>
      </div>
    </div>
    <div style="margin-bottom:20px;">
      <a href="https://www.google.com/maps/d/edit?mid=12x_-l7pj1OkGZJOPL2c2MTPSsKkYZDU&usp=sharing"
         target="_blank"
         style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:var(--terracotta);color:white;border-radius:8px;text-decoration:none;font-size:15px;font-weight:500;">
        🗺️ Åpne kartet i Google Maps
      </a>
    </div>
    <div style="position:relative;cursor:pointer;border-radius:12px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 8px var(--shadow);">
      <img src="Kart.png" alt="Kart over Premià de Mar" style="width:100%;display:block;">

    </div>
  </div>
</div>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>Ny seksjon</h3>
    <input type="text" id="newSectionTitle" placeholder="Tittel (f.eks. Vaskemaskin)">
    <select id="newSectionIcon">
      <option value="📋">📋 Generelt</option>
      <option value="⚡">⚡ Elektrisitet</option>
      <option value="📶">📶 WiFi / Telefon</option>
      <option value="🔥">🔥 Gass / Oppvarming</option>
      <option value="❄️">❄️ Air Condition</option>
      <option value="🚪">🚪 Dører / Vinduer</option>
      <option value="🗑️">🗑️ Søppel</option>
      <option value="🏥">🏥 Helse</option>
      <option value="🫧">🫧 Vaskemaskin</option>
      <option value="🍽️">🍽️ Kjøkken</option>
      <option value="📖">📖 Bruksanvisning</option>
      <option value="🔧">🔧 Vedlikehold</option>
    </select>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeAddModal()">Avbryt</button>
      <button class="btn btn-primary" onclick="addSection()">Legg til</button>
    </div>
  </div>
</div>

<script>
// ─── SUPABASE ──────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://sdzcgfmfnwzqhybpzudt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_YjHFAmx6fsTZsQRC5a12MA_fVZi7-S-';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let sections = [];

// ─── LAST INN FRA SUPABASE ────────────────────────────────────────────
async function loadSections() {
  const { data, error } = await db
    .from('sections')
    .select('*')
    .order('sort_order', { ascending: true });

  if (error) {
    console.error('Feil ved lasting:', error);
    document.getElementById('sections-container').innerHTML =
      '<div class="no-results">Kunne ikke laste innhold. Sjekk tilkoblingen.</div>';
    return;
  }

  sections = data;
  renderSections();
}

// ─── LAGRE TIL SUPABASE ───────────────────────────────────────────────
async function saveContent(id, content, statusEl) {
  statusEl.textContent = '💾 Lagrer…';
  statusEl.className = 'save-status saving';

  const { error } = await db
    .from('sections')
    .update({ content })
    .eq('id', id);

  if (error) {
    statusEl.textContent = '⚠️ Feil – ble ikke lagret';
    statusEl.className = 'save-status error';
  } else {
    statusEl.textContent = '✓ Lagret';
    statusEl.className = 'save-status saved';
    setTimeout(() => { statusEl.textContent = ''; }, 3000);
    // Oppdater lokalt array
    const sec = sections.find(s => s.id === id);
    if (sec) sec.content = content;
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────
function renderSections(filter = '') {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  let anyVisible = false;

  sections.forEach(sec => {
    const plainText = (sec.content || '').replace(/<[^>]+>/g, '');
    const matches = !filter ||
      sec.title.toLowerCase().includes(filter.toLowerCase()) ||
      plainText.toLowerCase().includes(filter.toLowerCase());
    if (!matches) return;
    anyVisible = true;

    let displayContent = sec.content || '';
    if (filter) displayContent = highlightText(displayContent, filter);

    const card = document.createElement('div');
    card.className = 'section-card' + (filter ? ' open' : '');

    card.innerHTML = `
      <div class="section-header" onclick="toggleCard(this.parentElement)">
        <div class="section-header-left">
          <div class="section-icon">${sec.icon || '📋'}</div>
          <div class="section-title">${sec.title}</div>
        </div>
        <span class="chevron">▾</span>
      </div>
      <div class="section-body">
        <div class="editable-content" contenteditable="true" data-id="${sec.id}"
          onblur="handleBlur(this)">
          ${displayContent}
        </div>
        <div class="save-status"></div>
        <div class="edit-hint">✏ Klikk i teksten for å redigere · endringer lagres automatisk</div>
      </div>
    `;
    container.appendChild(card);
  });

  if (!anyVisible && filter) {
    container.innerHTML = `<div class="no-results">Ingen resultater for "<strong>${filter}</strong>"</div>`;
  }
}

function handleBlur(el) {
  const id = el.dataset.id;
  const statusEl = el.nextElementSibling;
  saveContent(id, el.innerHTML, statusEl);
}

function toggleCard(card) { card.classList.toggle('open'); }
function expandAll() { document.querySelectorAll('.section-card').forEach(c => c.classList.add('open')); }

function highlightText(html, query) {
  if (!query) return html;
  const parts = html.split(/(<[^>]*>)/);
  return parts.map(p => p.startsWith('<') ? p :
    p.replace(new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
      m => `<mark class="highlight">${m}</mark>`)
  ).join('');
}

// ─── LEGG TIL SEKSJON ─────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('addModal').classList.add('open');
  document.getElementById('newSectionTitle').focus();
}
function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
  document.getElementById('newSectionTitle').value = '';
}

async function addSection() {
  const title = document.getElementById('newSectionTitle').value.trim();
  const icon = document.getElementById('newSectionIcon').value;
  if (!title) return;

  const maxOrder = sections.reduce((max, s) => Math.max(max, s.sort_order || 0), 0);

  const { data, error } = await db
    .from('sections')
    .insert([{ title, icon, content: '<p>Skriv innhold her…</p>', sort_order: maxOrder + 1 }])
    .select()
    .single();

  if (!error && data) {
    sections.push(data);
    closeAddModal();
    renderSections();
    setTimeout(() => {
      const cards = document.querySelectorAll('.section-card');
      if (cards.length) cards[cards.length - 1].classList.add('open');
    }, 50);
  }
}

// ─── SØK ──────────────────────────────────────────────────────────────
let searchTimer;
function handleSearch(value) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    if (!document.getElementById('tab-guide').classList.contains('active')) {
      switchTab('guide', document.querySelector('.tab'));
    }
    renderSections(value.trim());
  }, 200);
}

// ─── FANER ────────────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ─── PDF ──────────────────────────────────────────────────────────────
function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const pageW = 210, margin = 18, maxW = pageW - margin * 2;
  let y = 20;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(22);
  doc.setTextColor(44, 36, 32);
  doc.text('Premià de Mar – Leilighetsguide', margin, y);
  y += 8;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(138, 125, 112);
  doc.text('Carrer de Santiago Rusinol 8, 5. etg, 1. dor', margin, y);
  y += 12;
  doc.setDrawColor(196, 103, 58);
  doc.setLineWidth(0.5);
  doc.line(margin, y, pageW - margin, y);
  y += 10;

  sections.forEach(sec => {
    if (y > 260) { doc.addPage(); y = 20; }
    doc.setFillColor(245, 230, 222);
    doc.roundedRect(margin, y - 5, maxW, 10, 2, 2, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(196, 103, 58);
    doc.text(`${sec.icon}  ${sec.title}`, margin + 4, y + 2);
    y += 12;

    const text = (sec.content || '')
      .replace(/<h3[^>]*>/gi, '\n').replace(/<\/h3>/gi, ':\n')
      .replace(/<li>/gi, '• ').replace(/<\/li>/gi, '\n')
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/<p>/gi, '').replace(/<\/p>/gi, '\n')
      .replace(/<[^>]+>/g, '')
      .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&nbsp;/g, ' ')
      .replace(/\n{3,}/g, '\n\n').trim();

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(61, 50, 43);
    const lines = doc.splitTextToSize(text, maxW);
    lines.forEach(line => {
      if (y > 275) { doc.addPage(); y = 20; }
      doc.text(line, margin, y);
      y += 5;
    });
    y += 8;
  });

  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(138, 125, 112);
    doc.text(`Side ${i} av ${pageCount}`, pageW / 2, 290, { align: 'center' });
  }
  doc.save('premià-guide.pdf');
}

// ─── TASTATUR ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAddModal(); });
document.getElementById('addModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAddModal();
});
document.getElementById('newSectionTitle').addEventListener('keydown', e => {
  if (e.key === 'Enter') addSection();
});

// ─── START ────────────────────────────────────────────────────────────
loadSections();
</script>
</body>
</html>
